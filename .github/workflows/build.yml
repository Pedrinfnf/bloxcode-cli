name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            os: ubuntu-latest
            name: bloxcode-linux-arm64
            android: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: bloxcode-linux-x64
            android: false
          - target: aarch64-apple-darwin
            os: macos-latest
            name: bloxcode-macos-arm64
            android: false
          - target: x86_64-apple-darwin
            os: macos-latest
            name: bloxcode-macos-x64
            android: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Android NDK (for Termux ARM64)
        if: matrix.android
        run: |
          # Use Android NDK for aarch64-linux-android target
          sudo apt-get update
          sudo apt-get install -y unzip
          
          NDK_VERSION=r27c
          curl -sL "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          
          NDK_HOME="$(pwd)/android-ndk-${NDK_VERSION}"
          TOOLCHAIN="${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64"
          
          mkdir -p tui/.cargo
          cat > tui/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "${TOOLCHAIN}/bin/aarch64-linux-android24-clang"
          ar = "${TOOLCHAIN}/bin/llvm-ar"
          EOF
          
          echo "CC_aarch64_linux_android=${TOOLCHAIN}/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          echo "AR_aarch64_linux_android=${TOOLCHAIN}/bin/llvm-ar" >> $GITHUB_ENV

      - name: Build
        run: |
          cd tui
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp tui/target/${{ matrix.target }}/release/bloxcode ${{ matrix.name }} || cp tui/target/${{ matrix.target }}/release/bloxcode.exe ${{ matrix.name }}
          chmod +x ${{ matrix.name }} 2>/dev/null || true
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bloxcode-linux-arm64/bloxcode-linux-arm64.tar.gz
            bloxcode-linux-x64/bloxcode-linux-x64.tar.gz
            bloxcode-macos-arm64/bloxcode-macos-arm64.tar.gz
            bloxcode-macos-x64/bloxcode-macos-x64.tar.gz
          generate_release_notes: true
