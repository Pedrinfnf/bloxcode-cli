name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: bloxcode-linux-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: bloxcode-linux-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: bloxcode-macos-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: bloxcode-macos-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> tui/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> tui/.cargo/config.toml
          mkdir -p tui/.cargo

      - name: Build
        run: |
          cd tui
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cp tui/target/${{ matrix.target }}/release/bloxcode ${{ matrix.name }}
          chmod +x ${{ matrix.name }}
          tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bloxcode-linux-arm64/bloxcode-linux-arm64.tar.gz
            bloxcode-linux-x64/bloxcode-linux-x64.tar.gz
            bloxcode-macos-arm64/bloxcode-macos-arm64.tar.gz
            bloxcode-macos-x64/bloxcode-macos-x64.tar.gz
          generate_release_notes: true
